# LibreELEC WLAN-Konfiguration
# Erstellt: 2026-04-15

country=DE
ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1
pmf=1

# Primäres Netzwerk (Echte SSID vom alten Pi)
network={
    ssid="Searching4Crackdealers"
    psk="Ballern420"
    key_mgmt=WPA-PSK
    proto=WPA2
    pairwise=CCMP
    priority=5
    scan_ssid=1
}

